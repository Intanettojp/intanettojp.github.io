<script>

var audio = document.getElementById("audio");
var btn = document.getElementById("btn");
var cover = document.getElementById("cover");

/* AUTO PLAY */

window.addEventListener("load", function () {
    audio.play().then(() => {
        btn.innerHTML = '<i class="material-icons">pause</i>';
        cover.classList.remove("paused");
    }).catch(() => {});
});

/* RECONEXГғO */

function reconectar(){
    console.log("Reconectando...");
    setTimeout(function(){
        audio.load();
        audio.play();
    }, 3000);
}

audio.onerror = reconectar;
audio.onstalled = reconectar;
audio.onabort = reconectar;

/* BOTГғO */

btn.onclick = function () {
    if (audio.paused) {
        audio.play();
        btn.innerHTML = '<i class="material-icons">pause</i>';
        cover.classList.remove("paused");
    } else {
        audio.pause();
        audio.currentTime = 0;
        btn.innerHTML = '<i class="material-icons">play_arrow</i>';
        cover.classList.add("paused");
    }
};

/* FORГҮA PLAY */

setInterval(function(){
    if(audio.paused){
        audio.play();
    }
}, 10000);

/* API CENTRAL */

async function atualizarDados(){

try {

const r = await fetch("https://souox.com/radio-data.php?v=" + Date.now());
const data = await r.json();

/* MГҡSICA */

document.getElementById("track").innerText = "рҹҺө " + data.track;
document.getElementById("artist").innerText = "рҹҺӨ " + data.artist;

cover.src = data.cover;

/* FUNDO */



/* OUVINTES */

document.getElementById("ouvintes").innerText =
"" + (data.ouvintes_conectados * 1) + " OUVINTES";

/* ANГҡNCIO */

document.getElementById("ad-img").src = data.ad_image;
document.getElementById("ad-link").href = data.ad_link;

} catch (e) {

console.error("Erro API:", e);

}

}

/* LOOP */

setInterval(atualizarDados, 10000);
atualizarDados();

</script>
